name: Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
        default: dev

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  TF_VERSION: "1.14.6"
  EKS_CLUSTER_NAME: vibevault-${{ inputs.environment }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  terraform:
    name: "Terraform ${{ inputs.action }} (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: environments/${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      # ---------- PLAN ----------
      - name: "Plan: Stage 1 — VPC + ECR"
        if: inputs.action == 'plan'
        run: terraform plan -target=module.vpc -target=module.ecr

      - name: "Plan: Stage 2 — EKS"
        if: inputs.action == 'plan'
        run: terraform plan -target=module.eks

      - name: "Plan: Stage 3 — RDS + Secrets"
        if: inputs.action == 'plan'
        run: terraform plan -target=module.rds -target=module.secrets

      - name: "Plan: Stage 4 — Full (remaining refs)"
        if: inputs.action == 'plan'
        run: terraform plan

      # ---------- APPLY (staged to break circular deps) ----------
      # VPC + ECR have no dependencies
      - name: "Apply: Stage 1 — VPC + ECR"
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve -target=module.vpc -target=module.ecr

      # EKS needs VPC outputs; creates cluster_security_group_id needed by RDS
      - name: "Apply: Stage 2 — EKS"
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve -target=module.eks

      # RDS needs EKS security group; Secrets needs RDS KMS key
      - name: "Apply: Stage 3 — RDS + Secrets"
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve -target=module.rds -target=module.secrets

      # Final pass wires cross-module refs (EKS IRSA ↔ RDS/Secrets ARNs)
      - name: "Apply: Stage 4 — Full (wire cross-module refs)"
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve

      # ---------- DESTROY (reverse order) ----------
      - name: "Destroy: Stage 1 — EKS"
        if: inputs.action == 'destroy'
        run: terraform destroy -auto-approve -target=module.eks

      - name: "Destroy: Stage 2 — RDS + Secrets"
        if: inputs.action == 'destroy'
        run: terraform destroy -auto-approve -target=module.rds -target=module.secrets

      - name: "Destroy: Stage 3 — VPC + ECR"
        if: inputs.action == 'destroy'
        run: terraform destroy -auto-approve -target=module.vpc -target=module.ecr

  # ---------- POST-APPLY: Configure K8s resources ----------
  post-apply:
    name: "Configure Kubernetes"
    needs: terraform
    if: inputs.action == 'apply'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Create vibevault namespace
        run: kubectl create namespace vibevault --dry-run=client -o yaml | kubectl apply -f -

      - name: Install External Secrets Operator
        run: |
          # Get AWS account ID for IRSA role ARN
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ESO_ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/${{ env.EKS_CLUSTER_NAME }}-external-secrets-role"

          helm repo add external-secrets https://charts.external-secrets.io
          helm repo update

          helm upgrade --install external-secrets external-secrets/external-secrets \
            -n external-secrets --create-namespace \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"="${ESO_ROLE_ARN}" \
            --wait --timeout 120s

      - name: Resolve REPLACE_ placeholders and apply K8s manifests
        run: |
          # Query RDS for dynamic values
          RDS_ADDRESS=$(aws rds describe-db-instances \
            --db-instance-identifier ${{ env.EKS_CLUSTER_NAME }}-mysql \
            --query 'DBInstances[0].Endpoint.Address' --output text)

          RDS_MASTER_SECRET_ARN=$(aws rds describe-db-instances \
            --db-instance-identifier ${{ env.EKS_CLUSTER_NAME }}-mysql \
            --query 'DBInstances[0].MasterUserSecret.SecretArn' --output text)

          echo "RDS Address: $RDS_ADDRESS"
          echo "RDS Master Secret ARN: $RDS_MASTER_SECRET_ARN"

          # Apply ClusterSecretStore
          kubectl apply -f k8s/cluster-secret-store.yaml

          # Apply db-init ExternalSecrets with placeholders resolved
          sed \
            -e "s|REPLACE_WITH_RDS_ADDRESS|${RDS_ADDRESS}|g" \
            -e "s|REPLACE_WITH_RDS_MASTER_SECRET_ARN|${RDS_MASTER_SECRET_ARN}|g" \
            k8s/db-init-external-secrets.yaml | kubectl apply -f -

          # Wait for ExternalSecrets to sync
          echo "Waiting for ExternalSecrets to sync..."
          kubectl wait externalsecret/db-init-master-secret -n vibevault --for=condition=Ready --timeout=60s
          kubectl wait externalsecret/db-init-service-secrets -n vibevault --for=condition=Ready --timeout=60s

          # Run the DB init job (delete previous run if exists)
          kubectl delete job db-init -n vibevault --ignore-not-found
          kubectl apply -f k8s/db-init-job.yaml

          # Wait for job completion
          kubectl wait job/db-init -n vibevault --for=condition=complete --timeout=120s
          echo "DB init job completed successfully"

      - name: Deploy Kafka (KRaft single-node)
        run: |
          kubectl apply -f k8s/kafka.yaml
          echo "Waiting for Kafka to be ready..."
          kubectl rollout status deployment/kafka -n vibevault --timeout=120s
          echo "Kafka deployed successfully"

      - name: Deploy Kong Ingress Controller
        run: |
          # Fetch ACM cert ARN for vibesvault.live
          ACM_CERT_ARN=$(aws acm list-certificates --query "CertificateSummaryList[?DomainName=='www.vibesvault.live'].CertificateArn | [0]" --output text)
          if [ -z "$ACM_CERT_ARN" ] || [ "$ACM_CERT_ARN" = "None" ]; then
            echo "ERROR: ACM certificate for www.vibesvault.live not found"
            exit 1
          fi
          echo "ACM Certificate: $ACM_CERT_ARN"

          # Replace placeholder in kong-values.yaml
          sed -i "s|\${ACM_CERT_ARN}|${ACM_CERT_ARN}|g" k8s/kong-values.yaml

          helm repo add kong https://charts.konghq.com
          helm repo update
          helm upgrade --install kong kong/kong \
            -n kong --create-namespace \
            -f k8s/kong-values.yaml \
            --version 2.47.0 \
            --wait --timeout 300s
          echo "Waiting for Kong LoadBalancer..."
          LB_HOST=""
          for i in $(seq 1 30); do
            LB_HOST=$(kubectl get svc kong-kong-proxy -n kong -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
            if [ -n "$LB_HOST" ]; then
              echo "Kong LoadBalancer: $LB_HOST"
              break
            fi
            echo "  Waiting... ($i/30)"
            sleep 10
          done
          if [ -z "$LB_HOST" ]; then
            echo "ERROR: Kong LoadBalancer hostname not available after 5 minutes"
            exit 1
          fi

      - name: Apply Kong Ingress routes
        run: |
          kubectl apply -f k8s/kong-ingress.yaml
          echo "Kong Ingress routes applied"
