apiVersion: batch/v1
kind: Job
metadata:
  name: db-init
  namespace: vibevault
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: db-init
          image: mysql:8.0
          securityContext:
            runAsUser: 999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              export MYSQL_PWD="$MASTER_PASSWORD"
              printf 'CREATE DATABASE IF NOT EXISTS userservice;\nCREATE DATABASE IF NOT EXISTS productservice;\nCREATE USER IF NOT EXISTS '\''userservice_user'\''@'\''%%'\'' IDENTIFIED BY '\''%s'\'';\nGRANT SELECT, INSERT, UPDATE, DELETE, CREATE, ALTER, INDEX, DROP, REFERENCES ON userservice.* TO '\''userservice_user'\''@'\''%%'\'';\nCREATE USER IF NOT EXISTS '\''productservice_user'\''@'\''%%'\'' IDENTIFIED BY '\''%s'\'';\nGRANT SELECT, INSERT, UPDATE, DELETE, CREATE, ALTER, INDEX, DROP, REFERENCES ON productservice.* TO '\''productservice_user'\''@'\''%%'\'';\nFLUSH PRIVILEGES;\n' \
                "$USERSERVICE_DB_PASSWORD" \
                "$PRODUCTSERVICE_DB_PASSWORD" \
              | mysql -h "$RDS_HOST" -P "$RDS_PORT" -u "$MASTER_USERNAME"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: RDS_HOST
              valueFrom:
                configMapKeyRef:
                  name: db-init-config
                  key: RDS_HOST
            - name: RDS_PORT
              valueFrom:
                configMapKeyRef:
                  name: db-init-config
                  key: RDS_PORT
            - name: MASTER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-init-master-secret
                  key: username
            - name: MASTER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-init-master-secret
                  key: password
            - name: USERSERVICE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-init-service-secrets
                  key: userservice_password
            - name: PRODUCTSERVICE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-init-service-secrets
                  key: productservice_password
      volumes:
        - name: tmp
          emptyDir: {}
