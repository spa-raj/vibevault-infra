# Kong Ingress Controller Helm values
# NLB terminates TLS (port 443 → 80 on Kong), Kong handles HTTP only

ingressController:
  installCRDs: false

proxy:
  type: LoadBalancer
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:ap-south-1:966392474277:certificate/70f59280-a21e-4a22-bf7e-97df58f9f288"
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"
  tls:
    enabled: false
  http:
    enabled: true
    servicePort: 80
    containerPort: 8000

env:
  router_flavor: traditional

replicaCount: 1

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
