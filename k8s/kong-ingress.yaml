---
# Kong Ingress routes for all VibeVault microservices
# Apply with: kubectl apply -f k8s/kong-ingress.yaml

# ============================================================
# User Service — OAuth2 auth server + user management
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: userservice-ingress
  namespace: vibevault
  annotations:
    konghq.com/strip-path: "false"
spec:
  ingressClassName: kong
  rules:
    - host: www.vibesvault.live
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: userservice
                port:
                  number: 80
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: userservice
                port:
                  number: 80
          - path: /login
            pathType: Prefix
            backend:
              service:
                name: userservice
                port:
                  number: 80
          - path: /roles
            pathType: Prefix
            backend:
              service:
                name: userservice
                port:
                  number: 80

