apiVersion: v1
kind: ConfigMap
metadata:
  name: db-init-config
  namespace: vibevault
data:
  RDS_HOST: "REPLACE_WITH_RDS_ADDRESS"
  RDS_PORT: "3306"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-init-master-secret
  namespace: vibevault
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: db-init-master-secret
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: REPLACE_WITH_RDS_MASTER_SECRET_ARN
        property: username
    - secretKey: password
      remoteRef:
        key: REPLACE_WITH_RDS_MASTER_SECRET_ARN
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-init-service-secrets
  namespace: vibevault
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: db-init-service-secrets
    creationPolicy: Owner
  data:
    - secretKey: userservice_password
      remoteRef:
        key: vibevault/dev/userservice/db-credentials
        property: password
    - secretKey: productservice_password
      remoteRef:
        key: vibevault/dev/productservice/db-credentials
        property: password
    - secretKey: orderservice_password
      remoteRef:
        key: vibevault/dev/orderservice/db-credentials
        property: password
    - secretKey: paymentgateway_password
      remoteRef:
        key: vibevault/dev/paymentgateway/db-credentials
        property: password
